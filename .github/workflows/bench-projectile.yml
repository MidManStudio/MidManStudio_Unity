name: Projectile Core — Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'rust_lib/projectile_core/**'
  workflow_dispatch:
    inputs:
      note:
        description: 'Context for this run'
        required: false
        default: 'manual benchmark run'

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get Rust version
        id: rustver
        run: echo "ver=$(rustc --version)" >> $GITHUB_OUTPUT

      - name: Cache cargo registry + build
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust_lib/projectile_core/target/
          key: bench-projectile-${{ hashFiles('rust_lib/projectile_core/Cargo.toml') }}-${{ steps.rustver.outputs.ver }}
          restore-keys: bench-projectile-

      - name: Run Criterion benchmarks
        working-directory: rust_lib/projectile_core
        run: |
          cargo bench
        env:
          CARGO_TERM_COLOR: always

      - name: Parse results → JSON + HTML + Step Summary
        env:
          BUILD_NUM:    ${{ github.run_number }}
          BRANCH:       ${{ github.ref_name }}
          COMMIT:       ${{ github.sha }}
          RUN_NOTE:     ${{ inputs.note || 'push trigger' }}
          RUST_VER:     ${{ steps.rustver.outputs.ver }}
        run: |
          python3 - << 'PYEOF'
          import json, os, glob, datetime, sys

          # Paths
          CRIT_DIR = 'rust_lib/projectile_core/target/criterion'
          OUT_DIR = '.github/bench-results'
          os.makedirs(OUT_DIR, exist_ok=True)

          results_list = []

          # 1. Find all new benchmark results
          bench_files = glob.glob(f'{CRIT_DIR}/**/new/benchmark.json', recursive=True)

          for b_file in bench_files:
              with open(b_file, 'r') as f:
                  b_data = json.load(f)
              
              # Find corresponding estimates.json for timing
              e_file = b_file.replace('benchmark.json', 'estimates.json')
              if not os.path.exists(e_file): continue
              
              with open(e_file, 'r') as f:
                  e_data = json.load(f)

              group_id = b_data.get('group_id', 'Unknown')
              bench_id = b_data.get('function_id', b_data.get('value_str', 'Result'))
              
              # Mean time in nanoseconds
              mean_ns = e_data['mean']['point_estimate']
              low_ns  = e_data['mean']['confidence_interval']['lower_bound']
              high_ns = e_data['mean']['confidence_interval']['upper_bound']

              # Throughput Calculation
              thrpt_str = "—"
              tp_raw = b_data.get('throughput')
              # Criterion throughput can be a single dict or a list containing a dict
              tp = tp_raw[0] if isinstance(tp_raw, list) and len(tp_raw) > 0 else tp_raw
              
              if isinstance(tp, dict) and 'Elements' in tp:
                  count = tp['Elements']
                  # Elements / (ns * 1e-9) = Elements per second
                  per_sec = count / (mean_ns * 1e-9)
                  if per_sec >= 1_000_000:
                      thrpt_str = f"{per_sec/1_000_000:.2f} Melem/s"
                  elif per_sec >= 1_000:
                      thrpt_str = f"{per_sec/1_000:.2f} Kelem/s"
                  else:
                      thrpt_str = f"{per_sec:.2f} elem/s"

              results_list.append({
                  'group': group_id,
                  'name': bench_id,
                  'mean_ns': mean_ns,
                  'low': f"{low_ns/1_000_000:.3f} ms",
                  'mean': f"{mean_ns/1_000_000:.3f} ms",
                  'high': f"{high_ns/1_000_000:.3f} ms",
                  'thrpt': thrpt_str
              })

          # 2. Build the grouped structure
          groups_map = {}
          for r in results_list:
              if r['group'] not in groups_map:
                  groups_map[r['group']] = []
              groups_map[r['group']].append(r)

          # Sort benches within groups numerically if possible
          for g in groups_map:
              groups_map[g].sort(key=lambda x: (float(x['name']) if x['name'].isdigit() else x['name']))

          final_groups = [{'name': k, 'benches': v} for k, v in groups_map.items()]

          # 3. Save Projectile JSON
          data = {
              'build': os.environ['BUILD_NUM'],
              'branch': os.environ['BRANCH'],
              'commit': os.environ['COMMIT'][:7],
              'date': datetime.datetime.utcnow().isoformat() + 'Z',
              'rust_version': os.environ['RUST_VER'],
              'note': os.environ['RUN_NOTE'],
              'groups': final_groups,
              'summary': {'total': len(results_list), 'groups': len(final_groups)}
          }

          with open(f'{OUT_DIR}/projectile-bench-results.json', 'w') as f:
              json.dump(data, f, indent=2)

          # 4. Update HTML
          try:
              tpl_path = '.github/projectile-bench-template.html'
              tpl = open(tpl_path).read() if os.path.exists(tpl_path) else '<html><body><pre>__BENCH_DATA_JSON__</pre></body></html>'
              html = tpl.replace('__BENCH_DATA_JSON__', json.dumps(data))
              with open(f'{OUT_DIR}/index.html', 'w') as f: f.write(html)
          except Exception as e:
              print(f"HTML update failed: {e}")

          # 5. Write GitHub Summary
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_path, 'a') as s:
              s.write(f"## ⚡ Projectile Core — Benchmarks\n\n")
              s.write(f"**Build:** #{data['build']} | **Commit:** `{data['commit']}`\n\n")
              for g in final_groups:
                  s.write(f"### `{g['name']}`\n")
                  s.write("| Benchmark | Low | **Mean** | High | Throughput |\n|---|---|---|---|---|\n")
                  for b in g['benches']:
                      s.write(f"| `{b['name']}` | {b['low']} | **{b['mean']}** | {b['high']} | {b['thrpt']} |\n")
                  s.write("\n")

          print(f"Successfully processed {len(results_list)} benchmarks.")
          PYEOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/bench-results/
          git diff --staged --quiet && echo "no changes" || \
            git commit -m "ci: update bench results #${{ github.run_number }} [skip ci]"
          git push

      - name: Upload raw criterion report
        uses: actions/upload-artifact@v4
        with:
          name: bench-criterion-${{ github.run_number }}
          path: rust_lib/projectile_core/target/criterion/
          retention-days: 30
